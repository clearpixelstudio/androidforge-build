name: Build Android AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>/dev/null || true
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Generate Gradle 8.4 Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Downloading Gradle 8.4..."
            curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/g.zip
            unzip -q /tmp/g.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.4/bin/gradle wrapper --gradle-version=8.4 --distribution-type=bin
            echo "Gradle wrapper generated"
          fi
          chmod +x gradlew
          ls -la gradlew gradle/wrapper/ 2>/dev/null || true

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Show generated files
        run: find . -name "*.aab" -o -name "*.apk" | head -20

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/
          if-no-files-found: error
          retention-days: 30
